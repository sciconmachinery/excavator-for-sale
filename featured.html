<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f6f8;

}

/* WRAPPER */
.scroll-wrapper {
  overflow: hidden;
  width: 100%;
  padding: 14px 0;
  position: relative;
}

/* TRACK */
.scroll-track {
  display: flex;
  gap: 12px;
  width: max-content;
  animation: scroll 80s linear infinite;
  will-change: transform;
}

/* pause on hover (desktop) */
.scroll-wrapper:hover .scroll-track {
  animation-play-state: paused;
}

/* smoother infinite scroll */
@keyframes scroll {
  from { transform: translateX(0); }
  to { transform: translateX(-50%); }
}

/* CARD */
.card {
  min-width: 230px;
  max-width: 230px;
  background: #fff;
  border-radius: 12px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}

/* IMAGE (smaller) */
.card-img {
  width: 100%;
  height: 120px;
}

.card-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* CONTENT */
.card-content {
  padding: 8px 10px 10px;
  display: flex;
  flex-direction: column;
  flex-grow: 1;
}

/* label */
.tag {
  font-size: 10px;
  color: #666;
  margin-bottom: 2px;
}

/* segment */
.segment {
  display: inline-block;
  padding: 2px 6px;
  font-size: 9px;
  border-radius: 999px;
  background: #eaeaea;
  color: #555;
  margin-bottom: 6px;
}

/* title */
.card h3 {
  font-size: 13px;
  margin: 0 0 4px;
}

/* PRICE (closer to buttons now) */
.price {
  font-size: 13px;
  font-weight: bold;
  margin: 0 0 6px; /* 🔥 reduced spacing */
  color: #111;
}

/* BUTTONS */
.btn-row {
  margin-top: auto;
  display: flex;
  gap: 6px;
}

.btn {
  flex: 1;
  padding: 7px;
  border-radius: 8px;
  text-align: center;
  font-size: 11px;
  font-weight: bold;
  text-decoration: none;
  position: relative;
  z-index: 5; /* 🔥 FIX MOBILE CLICK ISSUE */
  pointer-events: auto;
}

.info-btn {
  background: #f1f1f1;
  color: #333;
}

.wa-btn {
  background: #25D366;
  color: white;
}

/* ================= MOBILE ================= */
@media (max-width: 768px) {

  .scroll-track {
    gap: 10px;
    animation-duration: 60s;
  }

  .card {
    min-width: 68vw;   /* 🔥 ensures full card visible */
    max-width: 68vw;
  }

  .card-img {
    height: 105px; /* 🔥 smaller image */
  }

  .card h3 {
    font-size: 12px;
  }

  .price {
    font-size: 12px;
  }

  .btn {
    font-size: 10px;
    padding: 6px;
  }
}
</style>

/* shuffle */
function shuffle(array) {
  let arr = array.slice();
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

const track = document.getElementById("track");

function createCard(item) {
  return `
    <div class="card">
      
      <a href="${item.pageLink}">
        <div class="card-img">
          <img src="${item.img}">
        </div>
      </a>

      <div class="card-content">
        <div class="tag">${item.label}</div>
        <div class="segment">${item.segment}</div>

        <h3>${item.title}</h3>

        <div class="price">${item.price}</div>

        <div class="btn-row">
          <a class="btn info-btn" href="${item.pageLink}">Details</a>
          <a class="btn wa-btn" href="${item.whatsapp}">WhatsApp</a>
        </div>
      </div>

    </div>
  `;
}

function render() {
  const shuffled = shuffle(excavators);
  let html = "";

  // duplicate for smooth scroll
  shuffled.forEach(i => html += createCard(i));
  shuffled.forEach(i => html += createCard(i));

  track.innerHTML = html;
}
