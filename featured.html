body {

/* SCROLL CONTAINER */
.scroll-wrapper {
  overflow: hidden;
  width: 100%;
  padding: 30px 0;
}

/* SCROLL TRACK */
.scroll-track {
  display: flex;
  gap: 24px;
  width: max-content;
  animation: scroll 60s linear infinite;
}

/* pause on hover */
.scroll-wrapper:hover .scroll-track {
  animation-play-state: paused;
}

/* smooth infinite scroll */
@keyframes scroll {
  from { transform: translateX(0); }
  to { transform: translateX(-100%); }
}

/* CARD */
.card {
  min-width: 260px;
  background: #fff;
  border-radius: 14px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transition: 0.25s ease;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

.card:hover {
  transform: translateY(-6px);
  box-shadow: 0 12px 25px rgba(0,0,0,0.12);
}

/* IMAGE */
.card-img {
  width: 100%;
  height: 180px;
  overflow: hidden;
}

.card-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* CONTENT */
.card-content {
  padding: 14px;
  display: flex;
  flex-direction: column;
  flex-grow: 1;
}

.tag {
  font-size: 12px;
  color: #666;

}

/* segment badge */

  color: #555;

.card h3 {

.card p {

/* BUTTONS */

.info-btn {

}

/* shuffle function */
function shuffle(array) {
  let arr = array.slice();
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

const track = document.getElementById("track");

function createCard(item) {
  return `
    <div class="card">
      <a href="${item.pageLink}" target="_blank">
        <div class="card-img">
          <img src="${item.img}" alt="${item.title}">
        </div>
      </a>

      <div class="card-content">
        <div class="tag">${item.label}</div>
        <div class="segment">${item.segment}</div>

        <h3>${item.title}</h3>
        <p>${item.price}</p>

        <div class="btn-row">
          <a class="btn info-btn" href="${item.pageLink}" target="_blank">Details</a>
          <a class="btn wa-btn" href="${item.whatsapp}" target="_blank">WhatsApp</a>
        </div>
      </div>
    </div>
  `;
}

function render() {
  const shuffled = shuffle(excavators);

  let html = "";

  // duplicate for smooth infinite scroll
  shuffled.forEach(i => html += createCard(i));
  shuffled.forEach(i => html += createCard(i));

  track.innerHTML = html;
}
