/* =========================
   SHUFFLE
   ========================= */
function shuffle(a){
  let arr = a.slice();
  for(let i = arr.length - 1; i > 0; i--){
    let j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

const track = document.getElementById("track");

/* =========================
   CREATE CARD
   ========================= */
function createCard(i){
  return `
    <div class="card">

      <a href="${i.pageLink}" target="_blank" rel="noopener noreferrer">
        <div class="card-img">
          <img src="${i.img}">
        </div>
      </a>

      <div class="card-content">
        <div class="tag">${i.label}</div>
        <div class="segment">${i.segment}</div>
        <h3>${i.title}</h3>

        <div class="price">${i.price}</div>

        <div class="btn-row">
          <a class="btn info-btn" href="${i.pageLink}" target="_blank" rel="noopener noreferrer">
            Details
          </a>

          <a class="btn wa-btn" href="${i.whatsapp}" target="_blank" rel="noopener noreferrer">
            WhatsApp
          </a>
        </div>
      </div>

    </div>
  `;
}

/* =========================
   RENDER RANDOM
   ========================= */
function render(){
  let s = shuffle(excavators);
  track.innerHTML = [...s, ...s].map(createCard).join("");
}
render();

/* =========================
   AUTO SCROLL
   ========================= */
let pos = 0;
let speed = 1.2;
let paused = false;

function animate(){
  if(!paused){
    pos += speed;
    if(pos >= track.scrollWidth / 2) pos = 0;
    track.style.transform = `translateX(-${pos}px)`;
  }
  requestAnimationFrame(animate);
}
animate();

/* =========================
   PAUSE CONTROL (FIXED)
   ========================= */
const wrapper = document.getElementById("wrapper");

wrapper.addEventListener("mouseenter", () => paused = true);
wrapper.addEventListener("mouseleave", () => paused = false);

wrapper.addEventListener("pointerdown", () => paused = true);
wrapper.addEventListener("pointerup", () => paused = false);
wrapper.addEventListener("pointercancel", () => paused = false);

document.addEventListener("visibilitychange", () => {
  paused = document.hidden;
});

</script>
