/* WRAPPER */
.scroll-wrapper {

  padding: 25px 15px;
}

/* TRACK */
.scroll-track {
  display: flex;
  gap: 18px;
  width: max-content;
  will-change: transform;
}

/* CARD */
.card {
  flex: 0 0 auto;
  width: 240px;
  background: #fff;
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  transition: 0.2s ease;
}

.card:hover {
  transform: scale(1.04);
}

.card img {
  width: 100%;
  height: 160px;
  object-fit: cover;
}

.card-content {
  padding: 12px;
}

.tag { font-size: 12px; color: #666; }
.segment {
  font-size: 10px;
  background: #eee;
  padding: 3px 8px;
  border-radius: 999px;

}

.btn-row {

}

.btn {

  text-align: center;
  text-decoration: none;
}

.info-btn { background: #eee; color: #333; }
.wa-btn { background: #25D366; color: #fff; }

/* ================= SHUFFLE ================= */
function shuffle(arr) {
  return arr.sort(() => Math.random() - 0.5);
}

/* ================= BUILD CARDS ================= */
const track = document.getElementById("track");
const wrapper = document.getElementById("wrapper");

function createCard(item) {
  return `
  <div class="card">
    <img src="${item.img}" loading="lazy">

    <div class="card-content">
      <div class="tag">${item.name}</div>
      <div class="segment">${item.segment}</div>

      <p>${item.price}</p>

      <div class="btn-row">
        <a class="btn info-btn" href="${item.page}">Details</a>
        <a class="btn wa-btn" href="${item.whatsapp}">WhatsApp</a>
      </div>
    </div>
  </div>`;
}

/* ================= LOAD ITEMS ================= */
function load() {
  let items = [];

  // duplicate shuffled list for seamless loop
  for (let i = 0; i < 5; i++) {
    items = items.concat(shuffle([...excavators]));
  }

  track.innerHTML = items.map(createCard).join("");
}

load();

/* ================= SMOOTH AUTO SCROLL ENGINE ================= */
let speed = 60; // pixels per second (adjust here)
let position = 0;
let paused = false;

let lastTime = null;

function animate(time) {
  if (!lastTime) lastTime = time;
  const delta = (time - lastTime) / 1000;
  lastTime = time;

  if (!paused) {
    position += speed * delta;

    const maxScroll = track.scrollWidth / 2;

    if (position >= maxScroll) {
      position = 0;
    }

    track.style.transform = `translateX(${-position}px)`;
  }

  requestAnimationFrame(animate);
}

requestAnimationFrame(animate);

/* ================= PAUSE ON HOVER ================= */
wrapper.addEventListener("mouseenter", () => paused = true);
wrapper.addEventListener("mouseleave", () => paused = false);
