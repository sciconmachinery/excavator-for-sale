const track = document.getElementById("track");

function card(item) {
  return `
    <div class="item">
      <div class="card">
        <div class="card-img">
          <img src="${item.img}">
        </div>

        <div class="card-content">
          <div class="tag">${item.label}</div>
          <div class="segment">${item.segment}</div>
          <h3>${item.title}</h3>
          <p>${item.price}</p>

          <div class="btn-row">
            <a class="btn info-btn" href="${item.pageLink}">Details</a>
            <a class="btn wa-btn" href="${item.whatsapp}">WhatsApp</a>
          </div>
        </div>
      </div>
    </div>
  `;
}

/* BUILD DOUBLE LIST (for seamless scroll) */
track.innerHTML = [...data, ...data].map(card).join("");

/* REAL PIXEL ANIMATION ENGINE */
let x = 0;
const speed = 0.6;

function animate() {
  x -= speed;

  const half = track.scrollWidth / 2;

  if (Math.abs(x) >= half) {
    x = 0;
  }

  track.style.transform = `translateX(${x}px)`;

  requestAnimationFrame(animate);
}

animate();
