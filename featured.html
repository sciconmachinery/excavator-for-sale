/* 🔀 RANDOM SHUFFLE */
function shuffle(array) {
  let arr = array.slice();
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

const track = document.getElementById("track");

function createCard(item) {
  return `
    <div class="card">
      <a href="${item.pageLink}" target="_blank">
        <div class="card-img">
          <img src="${item.img}">
        </div>
      </a>

      <div class="card-content">
        <div class="tag">${item.label}</div>
        <div class="segment">${item.segment}</div>

        <h3>${item.title}</h3>

        <div class="price">${item.price}</div>

        <div class="btn-row">
          <a class="btn info-btn" href="${item.pageLink}" target="_blank">Details</a>
          <a class="btn wa-btn" href="${item.whatsapp}" target="_blank">WhatsApp</a>
        </div>
      </div>
    </div>
  `;
}

/* render random + duplicate for infinite loop */
function render() {
  const shuffled = shuffle(excavators);

  let html = "";
  shuffled.forEach(i => html += createCard(i));
  shuffled.forEach(i => html += createCard(i)); // loop illusion

  track.innerHTML = html;
}

render();

/* =========================
   AUTO SCROLL (NO SWIPE)
   ========================= */

let pos = 0;
const speed = 0.9;

function move() {
  pos += speed;

  if (pos >= track.scrollWidth / 2) {
    pos = 0; // reset loop
  }

  track.style.transform = `translateX(${-pos}px)`;
  requestAnimationFrame(move);
}

move();
