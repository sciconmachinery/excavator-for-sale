/* FILTER */
.filter-bar {
  text-align: center;
  padding: 20px;
}

.filter-bar button {
  margin: 5px;
  padding: 10px 14px;
  border: none;
  border-radius: 8px;
  background: #eee;
  cursor: pointer;
  font-weight: bold;
}

.filter-bar button:hover {
  background: #ddd;
}

/* GRID */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 24px;
  padding: 30px;
  max-width: 1200px;
  margin: auto;
}

/* CARD */
.card {
  background: #fff;
  border-radius: 14px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transition: 0.25s ease;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

.card:hover {
  transform: translateY(-6px);
  box-shadow: 0 12px 25px rgba(0,0,0,0.12);
}

/* IMAGE */
.card-img {
  width: 100%;
  height: 180px;
  overflow: hidden;
}

.card-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* CONTENT */
.card-content {
  padding: 14px;
  display: flex;
  flex-direction: column;
  flex-grow: 1;
}

.tag {
  font-size: 12px;
  color: #666;
  margin-bottom: 6px;
}

.card h3 {
  font-size: 15px;
  margin: 0 0 6px;
}

.card p {
  font-size: 16px;
  font-weight: bold;
  margin-bottom: 10px;
}

/* BUTTONS */
.btn-row {
  margin-top: auto;
  display: flex;
  gap: 8px;
}

.btn {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  text-align: center;

.info-btn {

.wa-btn {
