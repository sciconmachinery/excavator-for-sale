body {
  font-family: Arial, sans-serif;

}

/* FILTER */
.filter-bar {
  text-align: center;
  padding: 20px;
}

.filter-bar button {
  margin: 5px;
  padding: 10px 14px;
  border: none;
  border-radius: 8px;
  background: #eee;
  cursor: pointer;
  font-weight: bold;
}

.filter-bar button:hover {
  background: #ddd;
}

/* SEARCH */
.search-box {
  text-align: center;
  padding: 10px 20px;
}

.search-box input {
  width: 100%;
  max-width: 400px;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ddd;
  font-size: 14px;
}

/* GRID */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 20px;
  padding: 20px;
  max-width: 1200px;
  margin: auto;
}

/* CARD */
.card {
  background: #fff;
  border-radius: 14px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  transition: 0.25s ease;
}

.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 12px 25px rgba(0,0,0,0.12);
}

/* IMAGE */
.card-img {
  width: 100%;
  height: 180px;
  overflow: hidden;
}

.card-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* SOLD TEXT */
.sold-text {
  color: #dc3545;
  font-weight: bold;
}

/* CONTENT */
.card-content {
  padding: 14px;
  display: flex;
  flex-direction: column;
  flex-grow: 1;
}

.tag {
  font-size: 12px;
  color: #666;
  margin-bottom: 6px;
}

.card h3 {
  font-size: 15px;
  margin: 0 0 6px;
}

.card p {
  font-size: 16px;
  font-weight: bold;
  margin-bottom: 10px;
}

/* BUTTONS */
.btn-row {
  margin-top: auto;
  display: flex;
  gap: 8px;
}

.btn {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  text-align: center;
  font-size: 13px;
  font-weight: bold;
  text-decoration: none;
}

.info-btn {
  background: #f1f1f1;
  color: #333;
}

.wa-btn {
  background: #25D366;
  color: white;
}
</style>

let currentFilter = "all";
let searchQuery = "";

const grid = document.getElementById("grid");
const searchInput = document.getElementById("searchInput");

/* SEARCH */
searchInput.addEventListener("input", (e) => {
  searchQuery = e.target.value.toLowerCase();
  render();
});

/* FILTER */
function filterItems(f) {
  currentFilter = f;
  render();
}

/* FILTER LOGIC */
function getFilteredData() {
  return data.filter(item => {
    const matchCategory = currentFilter === "all" || item.segment === currentFilter;

    const matchSearch =
      item.title.toLowerCase().includes(searchQuery) ||
      item.label.toLowerCase().includes(searchQuery);

    return matchCategory && matchSearch;
  });
}

/* RENDER ALL ITEMS (FIXED) */
function render() {
  const filtered = getFilteredData();

  let html = "";

  filtered.forEach((item, i) => {
    const isSold = item.title.toLowerCase().includes("(sold)");

    html += `
    <div class="card">
      <a href="${item.pageLink}" target="_blank">
        <div class="card-img">
          <img src="${item.img}" loading="lazy" decoding="async" alt="${item.title}">
        </div>
      </a>

      <div class="card-content">
        <div class="tag">${item.label}</div>

        <h3 class="${isSold ? 'sold-text' : ''}">
          ${item.title}
        </h3>

        <p>${item.price}</p>

        <div class="btn-row">
          <a class="btn info-btn" href="${item.pageLink}" target="_blank">Details</a>
          <a class="btn wa-btn" href="${item.whatsapp}" target="_blank">WhatsApp</a>
        </div>
      </div>
    </div>
    `;
  });

  grid.innerHTML = html;
}

/* INIT */
render();
